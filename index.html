<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mon Application Swing</title>
    <script src="https://cheerpj.com/cheerpj.js"></script>
</head>
<body>
    <script>
        cheerpjInit({
            // Options optionnelles
            javaVersion: '17', // ou '8', '11' selon votre version
            enableClipboard: true, // pour le presse-papiers
        });
        
        // Crée l'affichage et lance l'application
        cheerpjCreateDisplay(1024, 768);
        cheerpjRunJar("/app/app.jar");
    </script>
</body>
</html>
